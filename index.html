<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萬花筒系統 (Kaleidoscope) - 物理熵節點模擬</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background-color: #1e293b;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
        }
        h1 {
            font-size: 1.5rem;
            margin-top: 0;
            color: #38bdf8;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }
        canvas {
            background-color: #000;
            border: 1px solid #334155;
            border-radius: 4px;
            width: 100%;
            height: 400px;
            display: block;
            margin-bottom: 20px;
        }
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
        }
        label { margin-bottom: 8px; font-weight: bold; }
        input[type="range"] { width: 100%; }
        
        .data-panel {
            background-color: #020617;
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #334155;
        }
        .status {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .healthy { color: #4ade80; }
        .degraded { color: #f87171; }
        .hash-output {
            word-break: break-all;
            color: #cbd5e1;
            font-size: 0.9rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>萬花筒系統: 光學混沌腔體模擬</h1>
    
    <canvas id="chaosChamber" width="800" height="400"></canvas>
    
    <div class="controls">
        <div class="control-group">
            <label for="windSlider">環境微擾 (風力/震動): <span id="windVal">50</span>%</label>
            <input type="range" id="windSlider" min="0" max="100" value="50">
        </div>
        <div class="control-group">
            <label for="lightSlider">光子注入強度: <span id="lightVal">100</span></label>
            <input type="range" id="lightSlider" min="10" max="300" value="100">
        </div>
    </div>

    <div class="data-panel">
        <div class="status">
            <span>節點狀態: <strong id="healthStatus" class="healthy">HEALTHY (混沌狀態良好)</strong></span>
            <span>系統熵值 (Entropy): <strong id="entropyLevel">高</strong></span>
        </div>
        <div>實時輸出種子碼 (模擬 SHA-256 白化):</div>
        <div class="hash-output" id="hashOutput">等待初始化...</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('chaosChamber');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const windSlider = document.getElementById('windSlider');
    const lightSlider = document.getElementById('lightSlider');
    const windVal = document.getElementById('windVal');
    const lightVal = document.getElementById('lightVal');
    const healthStatus = document.getElementById('healthStatus');
    const entropyLevel = document.getElementById('entropyLevel');
    const hashOutput = document.getElementById('hashOutput');

    // System Variables
    let particles = [];
    let reflectors = [];
    let lastHash = "";
    let stagnantFrames = 0;

    // Helper: Generate Mock Hash based on state
    function generateMockHash(stateString) {
        let hash = 0;
        for (let i = 0; i < stateString.length; i++) {
            const char = stateString.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash = hash & hash;
        }
        // Convert to a pseudo-SHA256 looking string
        let hex = Math.abs(hash).toString(16).padStart(8, '0');
        while(hex.length < 64) {
            hex += Math.random().toString(16).substring(2, 10);
        }
        return hex.substring(0, 64);
    }

    // Classes
    class Particle {
        constructor() {
            this.x = canvas.width / 2;
            this.y = canvas.height / 2;
            this.vx = (Math.random() - 0.5) * 5;
            this.vy = (Math.random() - 0.5) * 5;
            this.life = 1.0;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            
            // Wall bounce
            if (this.x <= 0 || this.x >= canvas.width) this.vx *= -1;
            if (this.y <= 0 || this.y >= canvas.height) this.vy *= -1;

            this.x = Math.max(0, Math.min(canvas.width, this.x));
            this.y = Math.max(0, Math.min(canvas.height, this.y));
        }
        draw() {
            ctx.fillStyle = 'rgba(125, 211, 252, 0.8)';
            ctx.beginPath();
            ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    class Reflector {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.angle = Math.random() * Math.PI * 2;
            this.length = 30 + Math.random() * 40;
            this.spinSpeed = (Math.random() - 0.5) * 0.1;
        }
        update(windModifier) {
            this.angle += this.spinSpeed * windModifier;
        }
        draw() {
            ctx.strokeStyle = 'rgba(148, 163, 184, 0.6)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(this.x - Math.cos(this.angle) * this.length/2, this.y - Math.sin(this.angle) * this.length/2);
            ctx.lineTo(this.x + Math.cos(this.angle) * this.length/2, this.y + Math.sin(this.angle) * this.length/2);
            ctx.stroke();
        }
    }

    // Initialization
    function init() {
        for(let i=0; i<15; i++) {
            reflectors.push(new Reflector(
                50 + Math.random() * (canvas.width - 100), 
                50 + Math.random() * (canvas.height - 100)
            ));
        }
    }

    // Animation Loop
    function animate() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; // Trajectory effect
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const wind = parseInt(windSlider.value) / 50; // 0 to 2
        const targetLight = parseInt(lightSlider.value);

        windVal.innerText = windSlider.value;
        lightVal.innerText = targetLight;

        // Manage particle count
        while(particles.length < targetLight) particles.push(new Particle());
        while(particles.length > targetLight) particles.pop();

        // Update Physics
        let stateSnapshot = "";
        
        reflectors.forEach(r => {
            r.update(wind);
            r.draw();
            stateSnapshot += `${Math.round(r.angle*100)}`;
        });

        particles.forEach(p => {
            // Pseudo collision detection (deflection based on proximity to reflectors)
            reflectors.forEach(r => {
                const dist = Math.hypot(p.x - r.x, p.y - r.y);
                if(dist < r.length / 2) {
                    p.vx += (Math.random() - 0.5) * 2;
                    p.vy += (Math.random() - 0.5) * 2;
                }
            });

            // Speed limit
            const speed = Math.hypot(p.vx, p.vy);
            if(speed > 6) { p.vx *= 0.8; p.vy *= 0.8; }
            if(speed < 1) { p.vx *= 1.2; p.vy *= 1.2; }

            p.update();
            p.draw();
            stateSnapshot += `${Math.round(p.x)}${Math.round(p.y)}`;
        });

        // Entropy Health Check
        if (wind === 0) {
            stagnantFrames++;
        } else {
            stagnantFrames = 0;
        }

        if (stagnantFrames > 60) {
            healthStatus.className = "degraded";
            healthStatus.innerText = "DEGRADED (缺乏物理微擾，輸出凍結)";
            entropyLevel.innerText = "極低 (跌破安全閾值)";
            // Stop updating hash to simulate node exclusion
        } else {
            healthStatus.className = "healthy";
            healthStatus.innerText = "HEALTHY (混沌狀態良好)";
            entropyLevel.innerText = "高";
            
            // Generate and display new hash
            const currentHash = generateMockHash(stateSnapshot);
            hashOutput.innerText = currentHash;
        }

        requestAnimationFrame(animate);
    }

    init();
    animate();
</script>
</body>
</html>
